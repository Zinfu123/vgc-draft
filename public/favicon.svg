<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Badge background -->
    <rect width="64" height="64" rx="14" fill="#0f172a" />

    <!-- Top gloss -->
    <rect width="64" height="32" rx="14" fill="url(#gloss)" />

    <!-- Pokéball top half (red) -->
    <path d="M12 32 A20 20 0 0 1 52 32 Z" fill="#dc2626" />

    <!-- Shine on top half -->
    <path d="M15 24 A20 20 0 0 1 36 13" stroke="rgba(255,255,255,0.18)" stroke-width="2.5" stroke-linecap="round" fill="none" />

    <!-- Pokéball bottom half (white) -->
    <path d="M12 32 A20 20 0 0 0 52 32 Z" fill="#f1f5f9" />

    <!-- Outer circle -->
    <circle cx="32" cy="32" r="20" stroke="#0f172a" stroke-width="1.5" />

    <!-- Center band -->
    <rect x="12.5" y="30" width="39" height="4" fill="#0f172a" />

    <!-- Button ring -->
    <circle cx="32" cy="32" r="6.5" fill="#0f172a" />

    <!-- Button face -->
    <circle cx="32" cy="32" r="4.5" fill="white" />

    <!-- Button gloss -->
    <circle cx="30.5" cy="30.5" r="1.5" fill="white" opacity="0.55" />

    <defs>
        <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.07" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
    </defs>
</svg>
